<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow - Gerenciamento de Estudos</title>
  <link rel="icon" type="image/png" href="logos/iconlogo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Sora:wght@100..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-screen" id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="logos/logogrande.png" alt="StudyFlow" class="logo-img logo-img-full">
      </div>

      <div id="auth-login" class="auth-panel">
        <h1 class="auth-title">Bem-vindo de volta</h1>
        <p class="auth-subtitle">Entre na sua conta para continuar estudando</p>
        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" class="form-input" name="email" required placeholder="seu@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input type="password" class="form-input" name="password" required placeholder="Sua senha" autocomplete="current-password" minlength="6">
          </div>
          <p class="auth-error" id="auth-error" hidden></p>
          <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
        <p class="auth-switch">
          Não tem conta?
          <button type="button" class="auth-switch-btn" id="show-register">Criar conta</button>
        </p>
      </div>

      <div id="auth-register" class="auth-panel" hidden>
        <h1 class="auth-title">Criar conta</h1>
        <p class="auth-subtitle">Cadastre-se para organizar estudos e finanças</p>
        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label>Nome</label>
            <input type="text" class="form-input" name="name" required placeholder="Seu nome" autocomplete="name">
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" class="form-input" name="email" required placeholder="seu@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input type="password" class="form-input" name="password" required placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6">
          </div>
          <div class="form-group">
            <label>Confirmar senha</label>
            <input type="password" class="form-input" name="confirmPassword" required placeholder="Repita a senha" autocomplete="new-password" minlength="6">
          </div>
          <p class="auth-error" id="register-error" hidden></p>
          <button type="submit" class="btn btn-primary btn-block">Cadastrar</button>
        </form>
        <p class="auth-switch">
          Já tem conta?
          <button type="button" class="auth-switch-btn" id="show-login">Entrar</button>
        </p>
      </div>
    </div>
  </div>

  <div class="app" id="app" hidden>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <img src="logos/logogrande.png" alt="StudyFlow" class="logo-img logo-img-full">
        </div>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard">
          <span class="nav-icon nav-icon-dashboard"></span>
          Dashboard
        </button>
        <button class="nav-item" data-view="courses">
          <span class="nav-icon nav-icon-courses"></span>
          Cursos
        </button>
        <button class="nav-item" data-view="ranking">
          <span class="nav-icon nav-icon-ranking"></span>
          Ranking
        </button>
        <button class="nav-item" data-view="finance">
          <span class="nav-icon nav-icon-finance"></span>
          Finanças
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info" id="user-info"></div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <div class="logo-mobile">
            <img src="logos/iconlogo.png" alt="StudyFlow" class="logo-img logo-img-icon">
          </div>
          <h1 class="page-title" id="page-title">Dashboard</h1>
        </div>
        <div class="topbar-stats" id="topbar-stats"></div>
        <button class="profile-btn" id="topbar-profile" type="button" data-action="open-profile" aria-label="Abrir perfil"></button>
      </header>

      <div class="content" id="content"></div>
    </main>

    <nav class="bottom-nav" id="bottom-nav">
      <button class="bottom-nav-item active" data-view="dashboard">
        <span class="nav-icon nav-icon-dashboard"></span>
        <span class="bottom-nav-label">Inicio</span>
      </button>
      <button class="bottom-nav-item" data-view="courses">
        <span class="nav-icon nav-icon-courses"></span>
        <span class="bottom-nav-label">Cursos</span>
      </button>
      <button class="bottom-nav-item" data-view="ranking">
        <span class="nav-icon nav-icon-ranking"></span>
        <span class="bottom-nav-label">Ranking</span>
      </button>
      <button class="bottom-nav-item" data-view="finance">
        <span class="nav-icon nav-icon-finance"></span>
        <span class="bottom-nav-label">Finanças</span>
      </button>
    </nav>
  </div>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="btn-icon modal-close" id="modal-close" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
